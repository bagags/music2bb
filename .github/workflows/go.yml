name: Go

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true
      - run: go test ./...
      - run: go test -race ./...
      - run: go vet ./...
      - run: go test -run '^$' -tags='live authenticated browser_install' ./...

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            output: kg2bb-darwin-arm64
          - goos: darwin
            goarch: amd64
            output: kg2bb-darwin-amd64
          - goos: windows
            goarch: amd64
            output: kg2bb-windows-amd64.exe
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true
      - name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -trimpath -o dist/${{ matrix.output }} ./cmd/kg2bb
